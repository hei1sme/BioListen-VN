<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 562.5" width="100%" height="100%">
  <!-- Definitions for styling, filters, and markers -->
  <defs>
    <!-- Drop Shadow Filter for nodes -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Glowing Border Filter for active components -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Arrowhead markers -->
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00ff8f" />
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#059669" />
    </marker>
  </defs>

  <!-- Background grid lines for tech-blueprint styling -->
  <g stroke="rgba(0, 255, 143, 0.03)" stroke-width="1">
    <!-- Vertical lines -->
    <line x1="100" y1="0" x2="100" y2="562.5" />
    <line x1="200" y1="0" x2="200" y2="562.5" />
    <line x1="300" y1="0" x2="300" y2="562.5" />
    <line x1="400" y1="0" x2="400" y2="562.5" />
    <line x1="500" y1="0" x2="500" y2="562.5" />
    <line x1="600" y1="0" x2="600" y2="562.5" />
    <line x1="700" y1="0" x2="700" y2="562.5" />
    <line x1="800" y1="0" x2="800" y2="562.5" />
    <line x1="900" y1="0" x2="900" y2="562.5" />
    <!-- Horizontal lines -->
    <line x1="0" y1="100" x2="1000" y2="100" />
    <line x1="0" y1="200" x2="1000" y2="200" />
    <line x1="0" y1="300" x2="1000" y2="300" />
    <line x1="0" y1="400" x2="1000" y2="400" />
    <line x1="0" y1="500" x2="1000" y2="500" />
  </g>

  <!-- ==================== CONNECTIONS / FLOW ARROWS ==================== -->
  <g fill="none" stroke-width="1.5">
    <!-- 1. Waveform to Preprocessing -->
    <path d="M 125, 230 L 165, 230" stroke="#00ff8f" marker-end="url(#arrow-green)" />
    
    <!-- 2. Preprocessing to Mel-spectrogram -->
    <path d="M 285, 230 L 315, 230" stroke="#00ff8f" marker-end="url(#arrow-green)" />

    <!-- 3. Mel-spectrogram to CNN Backbone Input -->
    <path d="M 405, 230 L 445, 230" stroke="#00ff8f" marker-end="url(#arrow-green)" />

    <!-- 4. Inside CNN: MBConv Blocks to getitem_144 -->
    <path d="M 545, 230 L 575, 230" stroke="#00ff8f" marker-end="url(#arrow-green)" />

    <!-- 5. getitem_144 to GAP -->
    <path d="M 685, 230 L 715, 230" stroke="#00ff8f" marker-end="url(#arrow-green)" />

    <!-- 6. Branching from getitem_144 to XAI / Grad-CAM -->
    <path d="M 630, 260 L 630, 345" stroke="#059669" marker-end="url(#arrow-teal)" />

    <!-- 7. GAP Vector to Dual Heads (Branching) -->
    <!-- Species Head Branch -->
    <path d="M 795, 220 C 810, 220 810, 140 825, 140" stroke="#00ff8f" marker-end="url(#arrow-green)" />
    <!-- Threat Head Branch -->
    <path d="M 795, 240 C 810, 240 810, 320 825, 320" stroke="#00ff8f" marker-end="url(#arrow-green)" />

    <!-- 8. Heads to final output metrics -->
    <path d="M 925, 140 L 950, 140" stroke="#059669" marker-end="url(#arrow-teal)" />
    <path d="M 925, 320 L 950, 320" stroke="#059669" marker-end="url(#arrow-teal)" />
  </g>

  <!-- ==================== TẦNG 1: INPUT WAVEFORM (LEFT) ==================== -->
  <g transform="translate(15, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="110" height="100" fill="#0b130e" stroke="#00ff8f" stroke-width="1.2" rx="4" />
    <text x="55" y="22" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FAF9F5" text-anchor="middle">INPUT AUDIO</text>
    <text x="55" y="34" font-family="monospace" font-size="7" fill="rgba(250,249,245,0.4)" text-anchor="middle">5.0s .wav / .mp3</text>
    
    <!-- Waveform visualizer drawing -->
    <path d="M 15,65 L 25,50 L 35,80 L 45,35 L 55,75 L 65,45 L 75,85 L 85,60 L 95,65" fill="none" stroke="#00ff8f" stroke-width="1.5" />
    <text x="55" y="90" font-family="monospace" font-size="7" fill="#00ff8f" text-anchor="middle">SR: 22,050 Hz</text>
  </g>

  <!-- ==================== TẦNG 2: PREPROCESSING (MIDDLE LEFT) ==================== -->
  <g transform="translate(165, 145)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="170" fill="#0b130e" stroke="#00ff8f" stroke-width="1.2" rx="4" />
    <text x="60" y="20" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FAF9F5" text-anchor="middle">PREPROCESSING</text>
    <line x1="10" y1="28" x2="110" y2="28" stroke="rgba(0,255,143,0.15)" stroke-width="0.75" />

    <!-- Process step 1 -->
    <g transform="translate(8, 38)">
      <rect x="0" y="0" width="104" height="24" fill="rgba(0,255,143,0.03)" stroke="rgba(0,255,143,0.15)" stroke-width="0.5" rx="2" />
      <text x="52" y="15" font-family="monospace" font-size="7.5" fill="#FAF9F5" text-anchor="middle">1. Resample to 22k</text>
    </g>

    <!-- Process step 2 -->
    <g transform="translate(8, 70)">
      <rect x="0" y="0" width="104" height="24" fill="rgba(0,255,143,0.03)" stroke="rgba(0,255,143,0.15)" stroke-width="0.5" rx="2" />
      <text x="52" y="15" font-family="monospace" font-size="7.5" fill="#FAF9F5" text-anchor="middle">2. log-Mel Spec</text>
    </g>

    <!-- Process step 3 -->
    <g transform="translate(8, 102)">
      <rect x="0" y="0" width="104" height="24" fill="rgba(0,255,143,0.03)" stroke="rgba(0,255,143,0.15)" stroke-width="0.5" rx="2" />
      <text x="52" y="15" font-family="monospace" font-size="7.5" fill="#FAF9F5" text-anchor="middle">3. Normalise [0,1]</text>
    </g>

    <!-- Process step 4 -->
    <g transform="translate(8, 134)">
      <rect x="0" y="0" width="104" height="28" fill="rgba(0,255,143,0.03)" stroke="rgba(0,255,143,0.15)" stroke-width="0.5" rx="2" />
      <text x="52" y="12" font-family="monospace" font-size="7.5" fill="#FAF9F5" text-anchor="middle">4. Resize (224x224)</text>
      <text x="52" y="22" font-family="monospace" font-size="6.5" fill="#00ff8f" text-anchor="middle">Repeat Channels (RGB)</text>
    </g>
  </g>

  <!-- ==================== TẦNG 3: MEL-SPECTROGRAM VIEW (MIDDLE) ==================== -->
  <g transform="translate(315, 170)" filter="url(#shadow)">
    <rect x="0" y="0" width="90" height="120" fill="#000004" stroke="#00ff8f" stroke-width="1.2" rx="4" />
    <text x="45" y="18" font-family="sans-serif" font-size="8" font-weight="bold" fill="#fcffa4" text-anchor="middle">SPECTROGRAM</text>
    
    <!-- Fake log-frequency bands -->
    <g opacity="0.8">
      <rect x="10" y="30" width="70" height="10" fill="none" stroke="#bc3754" stroke-width="2" />
      <rect x="10" y="45" width="70" height="12" fill="none" stroke="#f98e09" stroke-width="4" />
      <rect x="10" y="62" width="70" height="8" fill="none" stroke="#fcffa4" stroke-width="1.5" />
      <rect x="10" y="75" width="70" height="15" fill="none" stroke="#57106e" stroke-width="3" />
      <rect x="10" y="95" width="70" height="6" fill="none" stroke="#f98e09" stroke-width="1" />
    </g>
    
    <text x="45" y="112" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.4)" text-anchor="middle">3 x 224 x 224</text>
  </g>

  <!-- ==================== TẦNG 4: CNN BACKBONE — EFFICIENTNET-V2 (MIDDLE RIGHT) ==================== -->
  <g transform="translate(445, 125)" filter="url(#shadow)">
    <rect x="0" y="0" width="240" height="210" fill="#0b130e" stroke="#00ff8f" stroke-width="1.5" rx="6" />
    <text x="120" y="22" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FAF9F5" text-anchor="middle">CNN BACKBONE (EfficientNet-V2-S)</text>
    <line x1="10" y1="32" x2="230" y2="32" stroke="rgba(0,255,143,0.15)" stroke-width="0.75" />

    <!-- Sub Convolutional blocks -->
    <!-- Conv Layer 1 -->
    <g transform="translate(15, 45)">
      <rect x="0" y="0" width="210" height="26" fill="rgba(0,255,143,0.03)" stroke="rgba(0,255,143,0.15)" stroke-width="0.5" rx="2" />
      <text x="10" y="16" font-family="monospace" font-size="8" fill="#FAF9F5">Stem Conv2d (3x3, stride=2)</text>
    </g>

    <!-- MBConv Blocks -->
    <g transform="translate(15, 80)">
      <rect x="0" y="0" width="210" height="42" fill="rgba(0,255,143,0.03)" stroke="rgba(0,255,143,0.15)" stroke-width="0.5" rx="2" />
      <text x="10" y="16" font-family="sans-serif" font-size="8.5" font-weight="bold" fill="#FAF9F5">MBConv / Fused-MBConv Blocks</text>
      <text x="10" y="30" font-family="monospace" font-size="7.5" fill="rgba(250,249,245,0.4)">Layers 1 to 7 (Pre-trained &amp; Frozen early)</text>
    </g>

    <!-- Final Conv Layer: getitem_144 -->
    <g transform="translate(15, 135)">
      <rect x="0" y="0" width="210" height="60" fill="rgba(0,255,143,0.03)" stroke="#00ff8f" stroke-width="1" rx="2" filter="url(#glow)" />
      <!-- Glowing dot -->
      <circle cx="200" cy="30" r="3.5" fill="#00ff8f" />
      <text x="10" y="18" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FAF9F5">Final Conv2d (getitem_144)</text>
      <text x="10" y="32" font-family="monospace" font-size="8" fill="#00ff8f">Activations output: 1280 x 7 x 7</text>
      <text x="10" y="46" font-family="monospace" font-size="7.5" fill="rgba(250,249,245,0.4)">Dynamically registered as graph output</text>
    </g>
  </g>

  <!-- ==================== TẦNG 4.5: XAI GRAD-CAM ENGINE (BOTTOM) ==================== -->
  <g transform="translate(510, 355)" filter="url(#shadow)">
    <!-- Main Box -->
    <rect x="0" y="0" width="215" height="160" fill="#0b130e" stroke="#059669" stroke-width="1.2" rx="4" />
    <text x="107.5" y="20" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FAF9F5" text-anchor="middle">EXPLAINABLE AI (XAI) PIPELINE</text>
    <line x1="10" y1="28" x2="205" y2="28" stroke="rgba(5,150,105,0.15)" stroke-width="0.75" />

    <!-- math mean absolute -->
    <g transform="translate(10, 38)">
      <rect x="0" y="0" width="195" height="28" fill="rgba(5,150,105,0.03)" stroke="rgba(5,150,105,0.15)" stroke-width="0.5" rx="2" />
      <text x="10" y="12" font-family="monospace" font-size="8" fill="#FAF9F5">1. Mean absolute activations</text>
      <text x="10" y="22" font-family="monospace" font-size="7.5" fill="#00ff8f">mean(abs(features), axis=0) -> (7,7)</text>
    </g>

    <!-- bilinear interpolation -->
    <g transform="translate(10, 72)">
      <rect x="0" y="0" width="195" height="26" fill="rgba(5,150,105,0.03)" stroke="rgba(5,150,105,0.15)" stroke-width="0.5" rx="2" />
      <text x="10" y="16" font-family="monospace" font-size="8" fill="#FAF9F5">2. Resize (7x7) -> (450x176)</text>
    </g>

    <!-- Gaussian blur + Jet Colormap -->
    <g transform="translate(10, 104)">
      <rect x="0" y="0" width="195" height="42" fill="rgba(5,150,105,0.03)" stroke="rgba(5,150,105,0.15)" stroke-width="0.5" rx="2" />
      <text x="10" y="14" font-family="monospace" font-size="8" fill="#FAF9F5">3. Smooth &amp; Colormap JET</text>
      <text x="10" y="25" font-family="monospace" font-size="7.5" fill="rgba(250,249,245,0.4)">cv2.GaussianBlur(kernel=35x35)</text>
      <text x="10" y="35" font-family="monospace" font-size="7.5" fill="#00ff8f">Adds Alpha Transparency channel</text>
    </g>
  </g>

  <!-- ==================== TẦNG 5: GLOBAL AVERAGE POOLING (RIGHT MIDDLE) ==================== -->
  <g transform="translate(715, 195)" filter="url(#shadow)">
    <rect x="0" y="0" width="80" height="70" fill="#0b130e" stroke="#00ff8f" stroke-width="1.2" rx="4" />
    <text x="40" y="24" font-family="sans-serif" font-size="8.5" font-weight="bold" fill="#FAF9F5" text-anchor="middle">GAP LAYER</text>
    <text x="40" y="42" font-family="monospace" font-size="9" fill="#00ff8f" text-anchor="middle">1280-dim</text>
    <text x="40" y="56" font-family="monospace" font-size="7" fill="rgba(250,249,245,0.4)" text-anchor="middle">Feature Vector</text>
  </g>

  <!-- ==================== TẦNG 6: DUAL HEADS (RIGHT) ==================== -->
  <!-- SPECIES HEAD (RIGHT TOP) -->
  <g transform="translate(825, 90)" filter="url(#shadow)">
    <rect x="0" y="0" width="100" height="90" fill="#0b130e" stroke="#00ff8f" stroke-width="1.2" rx="4" />
    <text x="50" y="22" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FAF9F5" text-anchor="middle">SPECIES HEAD</text>
    <line x1="10" y1="30" x2="90" y2="30" stroke="rgba(0,255,143,0.15)" stroke-width="0.75" />
    <text x="50" y="46" font-family="monospace" font-size="7.5" fill="rgba(250,249,245,0.5)" text-anchor="middle">FC (256) -> ReLU</text>
    <text x="50" y="60" font-family="monospace" font-size="7.5" fill="rgba(250,249,245,0.5)" text-anchor="middle">Dropout (0.3)</text>
    <text x="50" y="76" font-family="monospace" font-size="8" fill="#00ff8f" text-anchor="middle">Linear (24)</text>
  </g>

  <!-- THREAT HEAD (RIGHT BOTTOM) -->
  <g transform="translate(825, 275)" filter="url(#shadow)">
    <rect x="0" y="0" width="100" height="90" fill="#0b130e" stroke="#00ff8f" stroke-width="1.2" rx="4" />
    <text x="50" y="22" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FAF9F5" text-anchor="middle">THREAT HEAD</text>
    <line x1="10" y1="30" x2="90" y2="30" stroke="rgba(0,255,143,0.15)" stroke-width="0.75" />
    <text x="50" y="46" font-family="monospace" font-size="7.5" fill="rgba(250,249,245,0.5)" text-anchor="middle">FC (128) -> ReLU</text>
    <text x="50" y="60" font-family="monospace" font-size="7.5" fill="rgba(250,249,245,0.5)" text-anchor="middle">Dropout (0.3)</text>
    <text x="50" y="76" font-family="monospace" font-size="8" fill="#00ff8f" text-anchor="middle">Linear (9)</text>
  </g>

  <!-- ==================== OUTPUTS (RIGHT END) ==================== -->
  <!-- Species Outputs -->
  <g transform="translate(945, 95)">
    <circle cx="10" cy="45" r="3" fill="#059669" />
    <text x="22" y="32" font-family="sans-serif" font-size="9" font-weight="bold" fill="#00ff8f">SPECIES</text>
    <text x="22" y="45" font-family="monospace" font-size="8" fill="#FAF9F5">Identifications</text>
    <text x="22" y="58" font-family="monospace" font-size="7" fill="rgba(250,249,245,0.5)">Softmax (24 classes)</text>
  </g>

  <!-- Threat Outputs -->
  <g transform="translate(945, 275)">
    <circle cx="10" cy="45" r="3" fill="#059669" />
    <text x="22" y="32" font-family="sans-serif" font-size="9" font-weight="bold" fill="#00ff8f">THREATS</text>
    <text x="22" y="45" font-family="monospace" font-size="8" fill="#FAF9F5">Chainsaw/Gunshot</text>
    <text x="22" y="58" font-family="monospace" font-size="7" fill="rgba(250,249,245,0.5)">Sigmoid (9 classes)</text>
  </g>

</svg>
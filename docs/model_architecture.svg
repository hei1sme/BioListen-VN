<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 562.5" width="100%" height="100%" role="img" aria-label="BioListen VN AI model architecture">
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="135%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <filter id="glow" x="-22%" y="-22%" width="144%" height="144%">
      <feGaussianBlur stdDeviation="2.4" result="glow-blur"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.48" result="glow-color"/>
      <feComposite in="glow-color" in2="glow-blur" operator="in" result="glow-soft"/>
      <feMerge>
        <feMergeNode in="glow-soft"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="model-grad-input" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfeff" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#f0fdf4" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="model-grad-pre" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#f8fafc" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="model-grad-cnn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="model-grad-head" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdf4" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#ecfdf5" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="model-grad-threat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1f2" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#fef2f2" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="model-grad-xai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfeff" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#f0fdfa" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="model-spec-grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="0.35" stop-color="#7e22ce"/>
      <stop offset="0.63" stop-color="#f97316"/>
      <stop offset="1" stop-color="#fde047"/>
    </linearGradient>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#0d9488"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#e11d48"/>
    </marker>
  </defs>

  <g stroke="#94a3b8" stroke-opacity="0.16" stroke-width="0.8">
    <line x1="150" y1="38" x2="150" y2="526"/>
    <line x1="333" y1="38" x2="333" y2="526"/>
    <line x1="474" y1="38" x2="474" y2="526"/>
    <line x1="742" y1="38" x2="742" y2="526"/>
    <line x1="24" y1="281" x2="976" y2="281"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#0f172a">
    <g id="model-input-block" transform="translate(22 178)" filter="url(#shadow)">
      <rect width="118" height="156" rx="8" fill="url(#model-grad-input)" stroke="#14b8a6" stroke-width="1.25"/>
      <text x="59" y="22" text-anchor="middle" font-size="11" font-weight="800">ÂM THANH VÀO</text>
      <g transform="translate(15 42)" fill="none" stroke="#0f766e" stroke-width="1.8" stroke-linecap="round">
        <path d="M 0 30 C 7 7 14 7 21 30 S 35 53 42 30 S 56 7 63 30 S 77 53 88 28"/>
        <line x1="0" y1="61" x2="88" y2="61" stroke="#94a3b8" stroke-width="0.9"/>
      </g>
      <text x="14" y="117" font-size="9" fill="#334155">Tệp .wav dài 5.0 giây</text>
      <text x="14" y="132" font-size="9" fill="#334155">Tần số mẫu: 22,050 Hz</text>
      <text x="14" y="147" font-size="9" fill="#334155">110,250 mẫu</text>
    </g>

    <g id="model-preprocess-block" transform="translate(160 82)" filter="url(#shadow)">
      <rect width="164" height="318" rx="8" fill="url(#model-grad-pre)" stroke="#2563eb" stroke-width="1.25"/>
      <rect x="12" y="13" width="85" height="19" rx="9.5" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.7"/>
      <text x="54.5" y="26" text-anchor="middle" font-size="8.5" font-weight="800" fill="#1d4ed8">librosa</text>
      <text x="12" y="55" font-size="12" font-weight="800">TIỀN XỬ LÝ</text>
      <g font-size="8.2" fill="#334155">
        <rect x="12" y="75" width="140" height="27" rx="5" fill="#ffffff" fill-opacity="0.8" stroke="#bfdbfe"/>
        <text x="20" y="92">1. Lấy mẫu lại → 22,050 Hz</text>
        <rect x="12" y="110" width="140" height="43" rx="5" fill="#ffffff" fill-opacity="0.8" stroke="#bfdbfe"/>
        <text x="20" y="127">2. Log Mel-Spectrogram</text>
        <text x="20" y="140">n_fft=2048 | hop=512</text>
        <text x="20" y="151">n_mels=128</text>
        <rect x="12" y="161" width="140" height="27" rx="5" fill="#ffffff" fill-opacity="0.8" stroke="#bfdbfe"/>
        <text x="20" y="178">3. Công suất → dB (log)</text>
        <rect x="12" y="196" width="140" height="27" rx="5" fill="#ffffff" fill-opacity="0.8" stroke="#bfdbfe"/>
        <text x="20" y="213">4. Chuẩn hóa [0, 1]</text>
        <rect x="12" y="231" width="140" height="27" rx="5" fill="#ffffff" fill-opacity="0.8" stroke="#bfdbfe"/>
        <text x="20" y="248">5. Resize song tuyến → 224 × 224</text>
        <rect x="12" y="266" width="140" height="27" rx="5" fill="#ffffff" fill-opacity="0.8" stroke="#bfdbfe"/>
        <text x="20" y="283">6. Lặp kênh: 1 → 3 (RGB)</text>
      </g>
      <rect x="13" y="302" width="138" height="24" rx="5" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="82" y="317" text-anchor="middle" font-size="8.2" font-weight="800" fill="#1d4ed8">Tensor: (1, 3, 224, 224) float32</text>
    </g>

    <g id="model-mel-block" transform="translate(345 178)" filter="url(#shadow)">
      <rect width="110" height="156" rx="8" fill="#ffffff" fill-opacity="0.96" stroke="#7c3aed" stroke-width="1.25"/>
      <text x="55" y="22" text-anchor="middle" font-size="10.5" font-weight="800">PHỔ MEL</text>
      <rect x="16" y="43" width="78" height="70" rx="5" fill="#1e1b4b" stroke="#4c1d95"/>
      <g transform="translate(21 50)">
        <rect x="0" y="44" width="8" height="12" fill="#fde047"/>
        <rect x="10" y="33" width="8" height="23" fill="#fb923c"/>
        <rect x="20" y="18" width="8" height="38" fill="#f43f5e"/>
        <rect x="30" y="7" width="8" height="49" fill="#a855f7"/>
        <rect x="40" y="14" width="8" height="42" fill="#ec4899"/>
        <rect x="50" y="27" width="8" height="29" fill="#f97316"/>
        <rect x="60" y="39" width="8" height="17" fill="#fde047"/>
        <path d="M 0 10 C 18 35 34 5 67 27" fill="none" stroke="url(#model-spec-grad)" stroke-width="2"/>
      </g>
      <text x="55" y="137" text-anchor="middle" font-size="11" font-weight="800" fill="#6d28d9">3 × 224 × 224</text>
    </g>

    <g id="model-cnn-block" transform="translate(485 70)" filter="url(#shadow)">
      <rect width="245" height="328" rx="8" fill="url(#model-grad-cnn)" stroke="#ea580c" stroke-width="1.25"/>
      <text x="14" y="27" font-size="12" font-weight="800">BACKBONE CNN</text>
      <text x="14" y="43" font-size="9" fill="#475569">EfficientNet-V2-S, tiền huấn luyện ImageNet, tinh chỉnh</text>
      <g transform="translate(14 62)">
        <rect width="217" height="34" rx="5" fill="#ffffff" fill-opacity="0.82" stroke="#fed7aa"/>
        <text x="10" y="15" font-size="9" font-weight="800">Stem Conv2d</text>
        <text x="10" y="27" font-size="8" fill="#475569">kernel 3×3, stride=2</text>
      </g>
      <g transform="translate(14 107)">
        <rect width="217" height="42" rx="5" fill="#ffffff" fill-opacity="0.82" stroke="#fed7aa"/>
        <text x="10" y="16" font-size="9" font-weight="800">Fused-MBConv Blocks</text>
        <text x="10" y="29" font-size="8" fill="#475569">Lớp 1–3 (đóng băng)</text>
      </g>
      <g transform="translate(14 160)">
        <rect width="217" height="42" rx="5" fill="#ffffff" fill-opacity="0.82" stroke="#fed7aa"/>
        <text x="10" y="16" font-size="9" font-weight="800">MBConv Blocks</text>
        <text x="10" y="29" font-size="8" fill="#475569">Lớp 4–7 (tinh chỉnh)</text>
      </g>
      <g id="model-getitem-block" transform="translate(14 213)" filter="url(#glow)">
        <rect width="217" height="58" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
        <text x="10" y="16" font-size="9.4" font-weight="900">Conv2d cuối → getitem_144</text>
        <text x="10" y="31" font-size="8.4" fill="#166534">Kích hoạt đầu ra: (1, 160, 14, 14)</text>
        <text x="10" y="45" font-size="7.5" fill="#475569">Đăng ký làm output ONNX khi khởi động</text>
      </g>
      <g id="model-gap-block" transform="translate(14 284)">
        <rect width="217" height="33" rx="5" fill="#fff7ed" stroke="#fb923c"/>
        <text x="10" y="14" font-size="9" font-weight="800">Gộp trung bình toàn cục (GAP)</text>
        <text x="10" y="26" font-size="8" fill="#475569">Vector đặc trưng: 1280 chiều</text>
      </g>
    </g>

    <g id="model-species-head" transform="translate(762 58)" filter="url(#shadow)">
      <rect width="214" height="142" rx="8" fill="url(#model-grad-head)" stroke="#16a34a" stroke-width="1.25"/>
      <text x="14" y="25" font-size="12" font-weight="800">NHÁNH LOÀI</text>
      <text x="14" y="45" font-size="8.7" fill="#334155">FC (1280 → 256) • ReLU • Dropout p=0.3</text>
      <text x="14" y="62" font-size="8.7" fill="#334155">Linear (256 → 3) • Softmax</text>
      <rect x="14" y="79" width="186" height="47" rx="6" fill="#ffffff" fill-opacity="0.82" stroke="#86efac"/>
      <text x="107" y="95" text-anchor="middle" font-size="9" font-weight="800">Đầu ra: 3 nhóm lớp</text>
      <text x="107" y="113" text-anchor="middle" font-size="8.5" fill="#15803d">chim | ếch nhái | côn trùng</text>
    </g>

    <g id="model-threat-head" transform="translate(762 242)" filter="url(#shadow)">
      <rect width="214" height="142" rx="8" fill="url(#model-grad-threat)" stroke="#e11d48" stroke-width="1.25"/>
      <text x="14" y="25" font-size="12" font-weight="800">NHÁNH NGUY CƠ</text>
      <text x="14" y="45" font-size="8.7" fill="#334155">FC (1280 → 128) • ReLU • Dropout p=0.3</text>
      <text x="14" y="62" font-size="8.7" fill="#334155">Linear (128 → 9) • Sigmoid đa nhãn</text>
      <rect x="14" y="79" width="186" height="47" rx="6" fill="#ffffff" fill-opacity="0.82" stroke="#fecdd3"/>
      <text x="107" y="95" text-anchor="middle" font-size="9" font-weight="800">Đầu ra: 9 lớp nguy cơ</text>
      <text x="107" y="113" text-anchor="middle" font-size="8.2" fill="#be123c">cưa máy | súng | ... (9 nguy cơ)</text>
    </g>

    <g id="model-dropout-box" transform="translate(792 400)" filter="url(#shadow)">
      <rect width="184" height="72" rx="8" fill="#f8fafc" fill-opacity="0.96" stroke="#64748b" stroke-width="1.1"/>
      <text x="12" y="20" font-size="9.4" font-weight="800">ĐỘ BẤT ĐỊNH MC-DROPOUT</text>
      <text x="12" y="37" font-size="7.7" fill="#334155">N = 10 lượt, bật dropout</text>
      <text x="12" y="50" font-size="7.7" fill="#334155">σ² = (1/N) Σ(yₙ - μ)²</text>
      <text x="12" y="63" font-size="7.7" fill="#334155">σ_max &gt; 0.15 → độ tin cậy thấp</text>
    </g>

    <g id="model-xai-block" transform="translate(485 420)" filter="url(#shadow)">
      <rect width="285" height="112" rx="8" fill="url(#model-grad-xai)" stroke="#0d9488" stroke-width="1.25"/>
      <text x="14" y="24" font-size="12" font-weight="800" fill="#0f766e">LUỒNG XAI / GRAD-CAM</text>
      <text x="14" y="43" font-size="8.2" fill="#334155">1. Trích tensor kích hoạt (160, 14, 14)</text>
      <text x="14" y="57" font-size="8.2" fill="#334155">2. Trung bình |Abs| qua 160 kênh → (14, 14)</text>
      <text x="14" y="70" font-size="8.2" fill="#334155">M[i,j] = (1/160) Σ|Aᵏ[i,j]|</text>
      <text x="14" y="83" font-size="8.2" fill="#334155">3. Phóng song tuyến: (14,14) → (450, 176)</text>
      <text x="14" y="96" font-size="8.2" fill="#334155">4. Làm mờ Gaussian: kernel 45×45</text>
      <text x="14" y="109" font-size="8.2" fill="#334155">5. COLORMAP_JET + alpha 80% • 6. PNG Base64</text>
    </g>

    <g id="model-xai-output" transform="translate(806 488)" filter="url(#glow)">
      <rect width="170" height="44" rx="8" fill="#ecfdf5" stroke="#14b8a6" stroke-width="1.4"/>
      <text x="85" y="19" text-anchor="middle" font-size="9.5" font-weight="900" fill="#0f766e">Bản đồ nhiệt Grad-CAM</text>
      <text x="85" y="34" text-anchor="middle" font-size="8.3" fill="#0f766e">Lớp phủ PNG Base64</text>
    </g>

    <g id="model-flow-arrows" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path id="model-arrow-input-pre" d="M 140 256 L 160 256" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
      <path id="model-arrow-pre-mel" d="M 324 256 L 345 256" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
      <path id="model-arrow-mel-cnn" d="M 455 256 L 485 256" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
      <path id="model-arrow-gap-species" d="M 730 370 C 746 370 742 129 762 129" stroke="#16a34a" stroke-width="2.1" marker-end="url(#arrow-green)"/>
      <path id="model-arrow-gap-threat" d="M 730 370 C 746 370 742 313 762 313" stroke="#e11d48" stroke-width="2.1" marker-end="url(#arrow-rose)"/>
      <path id="model-arrow-getitem-xai" d="M 607 341 L 607 420" stroke="#0d9488" stroke-width="2.1" marker-end="url(#arrow-teal)"/>
      <path id="model-arrow-xai-output" d="M 770 506 L 806 506" stroke="#0d9488" stroke-width="2.1" marker-end="url(#arrow-teal)"/>
      <path id="model-arrow-heads-dropout" d="M 884 200 L 884 242" stroke="#64748b" stroke-width="1.6" stroke-dasharray="4 4"/>
      <path id="model-arrow-threat-dropout" d="M 884 384 L 884 400" stroke="#64748b" stroke-width="1.6" stroke-dasharray="4 4"/>
    </g>

    <g id="model-flow-labels" font-size="8.2" font-weight="700">
      <rect x="526" y="402" width="138" height="15" rx="4" fill="#ffffff" fill-opacity="0.9"/>
      <text x="595" y="413" text-anchor="middle" font-size="7.8" fill="#0f766e">getitem_144: nhánh XAI</text>
      <rect x="733" y="341" width="27" height="15" rx="4" fill="#ffffff" fill-opacity="0.9"/>
      <text x="746.5" y="352" text-anchor="middle" font-size="7.8" fill="#15803d">Gộp</text>
    </g>
  </g>
</svg>
